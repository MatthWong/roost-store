<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roost Store — Shop</title>
    <style>
      :root {
        --purple:     #5b2d90;
        --purple-h:   #7a3fbf;
        --gold:       #f0b429;
        --gold-h:     #f5c842;
        --bg:         #f9f6ff;
        --surface:    #ffffff;
        --border:     #e0d8f0;
        --text:       #1a1a2e;
        --muted:      #6b6b8a;
        --ok:         #2ecc71;
        --err:        #e74c3c;
        --radius:     10px;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
        font-size: 14px;
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        background: var(--purple);
        color: #fff;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      header h1 { font-size: 18px; letter-spacing: .5px; }
      .cart-toggle {
        background: var(--gold);
        color: var(--text);
        border: none;
        border-radius: 20px;
        padding: 6px 16px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }
      .cart-toggle:hover { background: var(--gold-h); }

      /* ── Layout ── */
      .layout {
        display: flex;
        gap: 0;
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px 16px;
        align-items: flex-start;
      }

      /* ── Product Grid ── */
      .product-section { flex: 1; min-width: 0; }
      .product-section h2 { font-size: 15px; color: var(--purple); margin-bottom: 14px; }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 14px;
      }

      .product-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        box-shadow: 0 1px 4px rgba(0,0,0,.06);
      }
      .product-card img, .product-card .img-placeholder {
        width: 100%;
        height: 140px;
        object-fit: cover;
        background: #ede8f8;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted);
        font-size: 32px;
      }
      .card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
      .card-name { font-weight: 700; font-size: 13px; }
      .card-desc { font-size: 12px; color: var(--muted); flex: 1; }
      .card-price { font-size: 14px; font-weight: 700; color: var(--purple); }
      .card-footer { padding: 0 10px 10px; display: flex; align-items: center; gap: 8px; }
      .oos-badge {
        font-size: 11px;
        background: #f2dede;
        color: var(--err);
        border-radius: 20px;
        padding: 3px 10px;
        font-weight: 700;
      }
      .add-btn {
        flex: 1;
        background: var(--purple);
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 7px 0;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }
      .add-btn:hover { background: var(--purple-h); }
      .add-btn:disabled { opacity: .45; cursor: not-allowed; }

      /* ── Cart Panel ── */
      .cart-panel {
        width: 300px;
        flex-shrink: 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        margin-left: 20px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 2px 8px rgba(0,0,0,.08);
        position: sticky;
        top: 16px;
        max-height: calc(100vh - 80px);
        overflow: hidden;
      }
      .cart-panel.hidden { display: none; }
      .cart-header {
        background: var(--purple);
        color: #fff;
        padding: 10px 14px;
        font-weight: 700;
        font-size: 14px;
        border-radius: var(--radius) var(--radius) 0 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .cart-items {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .cart-empty { color: var(--muted); font-size: 13px; text-align: center; padding: 20px 0; }
      .cart-line {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--bg);
        border-radius: 6px;
        padding: 6px 8px;
      }
      .cart-line-name { flex: 1; font-size: 12px; font-weight: 600; }
      .qty-ctrl {
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .qty-btn {
        background: var(--purple);
        color: #fff;
        border: none;
        border-radius: 4px;
        width: 22px;
        height: 22px;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .qty-btn:hover { background: var(--purple-h); }
      .qty-num { width: 24px; text-align: center; font-size: 13px; font-weight: 700; }
      .remove-btn {
        background: none;
        border: none;
        color: var(--err);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        padding: 0 2px;
      }
      .line-price { font-size: 12px; color: var(--muted); white-space: nowrap; }
      .cart-total {
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        font-weight: 700;
        font-size: 14px;
        display: flex;
        justify-content: space-between;
      }

      /* ── Checkout Form ── */
      .checkout-form {
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .checkout-form input {
        width: 100%;
        padding: 7px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 13px;
        outline: none;
      }
      .checkout-form input:focus { border-color: var(--purple); }
      .checkout-note {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.4;
      }
      .place-order-btn {
        background: var(--gold);
        color: var(--text);
        border: none;
        border-radius: 6px;
        padding: 10px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        width: 100%;
      }
      .place-order-btn:hover { background: var(--gold-h); }
      .place-order-btn:disabled { opacity: .45; cursor: not-allowed; }
      .form-error { font-size: 12px; color: var(--err); text-align: center; }

      /* ── Success Screen ── */
      .success-screen {
        display: none;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
      }
      .success-screen.show { display: flex; }
      .success-title { font-weight: 700; font-size: 15px; color: var(--ok); text-align: center; }
      .success-detail { font-size: 12px; color: var(--muted); }
      .success-detail b { color: var(--text); }
      .pay-link {
        display: block;
        background: var(--purple);
        color: #fff;
        text-decoration: none;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 700;
        text-align: center;
        margin-top: 2px;
      }
      .pay-link:hover { background: var(--purple-h); }
      .new-order-btn {
        background: var(--border);
        border: none;
        border-radius: 6px;
        padding: 8px;
        font-size: 12px;
        cursor: pointer;
        width: 100%;
        margin-top: 6px;
      }
      .new-order-btn:hover { background: #d0c8e8; }

      /* ── Loading overlay ── */
      .loading-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.35);
        align-items: center;
        justify-content: center;
        z-index: 999;
      }
      .loading-overlay.show { display: flex; }
      .loading-spinner {
        width: 48px;
        height: 48px;
        border: 5px solid #fff;
        border-top-color: var(--purple);
        border-radius: 50%;
        animation: spin .8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Toast ── */
      #toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(60px);
        background: var(--text);
        color: #fff;
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 13px;
        transition: transform .3s;
        z-index: 1000;
        pointer-events: none;
      }
      #toast.show { transform: translateX(-50%) translateY(0); }

      /* ── Responsive ── */
      @media (max-width: 640px) {
        .layout { flex-direction: column; }
        .cart-panel { width: 100%; margin-left: 0; margin-top: 20px; position: static; max-height: none; }
        .cart-panel.hidden { display: none; }
      }
    </style>
  </head>
  <body>

    <header>
      <h1>&#127881; Roost Store</h1>
      <button class="cart-toggle" id="cartToggleBtn" onclick="toggleCart()">
        &#128722; Cart (<span id="cartCount">0</span>)
      </button>
    </header>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
    </div>

    <div class="layout">
      <!-- Product Grid -->
      <section class="product-section">
        <h2>Products</h2>
        <div class="product-grid" id="productGrid">
          <p style="color:var(--muted);font-size:13px;">Loading products…</p>
        </div>
      </section>

      <!-- Cart Panel -->
      <aside class="cart-panel hidden" id="cartPanel">
        <div class="cart-header">
          <span>&#128722; Your Cart</span>
          <button onclick="toggleCart()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;line-height:1;">&#215;</button>
        </div>

        <!-- Items list (shown when cart has items and not in success state) -->
        <div id="cartMain">
          <div class="cart-items" id="cartItems">
            <p class="cart-empty">Your cart is empty.</p>
          </div>

          <div class="cart-total">
            <span>Total</span>
            <span id="cartTotal">$0.00</span>
          </div>

          <form class="checkout-form" id="checkoutForm" onsubmit="placeOrder(event)">
            <input type="text"  id="custName"  placeholder="Full Name"    required />
            <input type="email" id="custEmail" placeholder="School Email" required />
            <p class="checkout-note">
              Payment links will be included in your confirmation email.
              Placing this order does not charge you immediately.
            </p>
            <div class="form-error" id="formError"></div>
            <button class="place-order-btn" id="placeOrderBtn" type="submit">Place Order</button>
          </form>
        </div>

        <!-- Success screen (shown after successful submission) -->
        <div class="success-screen" id="successScreen">
          <p class="success-title">&#10003; Order Placed!</p>
          <p class="success-detail">
            <b>Order #:</b> <span id="successOrderNum"></span><br>
            <b>Receipt:</b> <span id="successReceipt"></span>
          </p>
          <p class="success-detail">Check your email for payment links and order status updates.</p>
          <div id="successPayLinks"></div>
          <button class="new-order-btn" onclick="resetCart()">Start a New Order</button>
        </div>
      </aside>
    </div>

    <div id="toast"></div>

    <script>
      var WEB_APP_URL = '<?!= webAppUrl ?>';

      // ── State ──────────────────────────────────────────────────────────────
      var products = [];    // loaded from server
      var cart     = [];    // [{ product, quantity }]
      var cartOpen = false;

      // ── Boot ───────────────────────────────────────────────────────────────
      google.script.run
        .withSuccessHandler(function(data) {
          products = data || [];
          renderProducts();
        })
        .withFailureHandler(function(err) {
          document.getElementById('productGrid').innerHTML =
            '<p style="color:var(--err);font-size:13px;">Failed to load products. Please refresh.</p>';
        })
        .getActiveProducts();

      // ── Render Products ────────────────────────────────────────────────────
      function renderProducts() {
        var grid = document.getElementById('productGrid');
        if (!products.length) {
          grid.innerHTML = '<p style="color:var(--muted);font-size:13px;">No products available right now.</p>';
          return;
        }
        grid.innerHTML = products.map(function(p, i) {
          var oos = p.inventoryCount !== null && p.inventoryCount <= 0;
          var price = p.priceCents ? '$' + (p.priceCents / 100).toFixed(2) : '';
          var imgHtml = p.imageUrl
            ? '<img src="' + esc(p.imageUrl) + '" alt="' + esc(p.name) + '" onerror="this.parentElement.innerHTML=\'<div class=\\\"img-placeholder\\\">&#127873;</div>\'" />'
            : '<div class="img-placeholder">&#127873;</div>';
          return '<div class="product-card">'
            + imgHtml
            + '<div class="card-body">'
            +   '<div class="card-name">' + esc(p.name) + '</div>'
            +   (p.description ? '<div class="card-desc">' + esc(p.description) + '</div>' : '')
            +   (price ? '<div class="card-price">' + price + '</div>' : '')
            + '</div>'
            + '<div class="card-footer">'
            +   (oos
                  ? '<span class="oos-badge">Out of Stock</span>'
                  : '<button class="add-btn" onclick="addToCart(' + i + ')">+ Add to Cart</button>')
            + '</div>'
            + '</div>';
        }).join('');
      }

      // ── Cart Operations ────────────────────────────────────────────────────
      function addToCart(productIndex) {
        var product = products[productIndex];
        if (!product) { return; }

        var existing = cart.find(function(line) { return line.product === product; });
        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({ product: product, quantity: 1 });
        }
        renderCart();
        showToast(product.name + ' added to cart');
        if (!cartOpen) { toggleCart(); }
      }

      function changeQty(index, delta) {
        if (!cart[index]) { return; }
        cart[index].quantity += delta;
        if (cart[index].quantity < 1) { cart.splice(index, 1); }
        renderCart();
      }

      function removeLine(index) {
        cart.splice(index, 1);
        renderCart();
      }

      // ── Render Cart ────────────────────────────────────────────────────────
      function renderCart() {
        var itemsEl  = document.getElementById('cartItems');
        var totalEl  = document.getElementById('cartTotal');
        var countEl  = document.getElementById('cartCount');
        var totalCts = 0;
        var totalQty = 0;

        if (!cart.length) {
          itemsEl.innerHTML = '<p class="cart-empty">Your cart is empty.</p>';
          totalEl.textContent = '$0.00';
          countEl.textContent = '0';
          return;
        }

        itemsEl.innerHTML = cart.map(function(line, i) {
          var lineCents = line.product.priceCents * line.quantity;
          totalCts += lineCents;
          totalQty += line.quantity;
          return '<div class="cart-line">'
            + '<div class="cart-line-name">' + esc(line.product.name) + '</div>'
            + '<div class="qty-ctrl">'
            +   '<button class="qty-btn" onclick="changeQty(' + i + ', -1)">&#8722;</button>'
            +   '<span class="qty-num">' + line.quantity + '</span>'
            +   '<button class="qty-btn" onclick="changeQty(' + i + ', 1)">+</button>'
            + '</div>'
            + '<span class="line-price">$' + (lineCents / 100).toFixed(2) + '</span>'
            + '<button class="remove-btn" onclick="removeLine(' + i + ')" title="Remove">&#215;</button>'
            + '</div>';
        }).join('');

        totalEl.textContent = '$' + (totalCts / 100).toFixed(2);
        countEl.textContent = totalQty;
      }

      // ── Toggle Cart ────────────────────────────────────────────────────────
      function toggleCart() {
        cartOpen = !cartOpen;
        document.getElementById('cartPanel').classList.toggle('hidden', !cartOpen);
      }

      // ── Place Order ────────────────────────────────────────────────────────
      function placeOrder(event) {
        event.preventDefault();
        var errorEl = document.getElementById('formError');
        errorEl.textContent = '';

        var name  = document.getElementById('custName').value.trim();
        var email = document.getElementById('custEmail').value.trim();

        if (!name)  { errorEl.textContent = 'Please enter your full name.'; return; }
        if (!email || email.indexOf('@') === -1) { errorEl.textContent = 'Please enter a valid school email.'; return; }
        if (!cart.length) { errorEl.textContent = 'Your cart is empty.'; return; }

        var items = cart.map(function(line) {
          return {
            sku:           line.product.sku,
            name:          line.product.name,
            quantity:      line.quantity,
            unitPriceCents: line.product.priceCents,
            paymentLink:   line.product.paymentLink
          };
        });

        var btn = document.getElementById('placeOrderBtn');
        btn.disabled = true;
        btn.textContent = 'Placing Order…';
        document.getElementById('loadingOverlay').classList.add('show');

        google.script.run
          .withSuccessHandler(function(result) {
            document.getElementById('loadingOverlay').classList.remove('show');
            showSuccessScreen(result);
          })
          .withFailureHandler(function(err) {
            document.getElementById('loadingOverlay').classList.remove('show');
            var msg = (err && err.message) ? err.message : 'Order failed. Please try again.';
            errorEl.textContent = msg;
            btn.disabled = false;
            btn.textContent = 'Place Order';
          })
          .submitCartOrder({ customerName: name, customerEmail: email, items: items });
      }

      // ── Success Screen ─────────────────────────────────────────────────────
      function showSuccessScreen(result) {
        document.getElementById('cartMain').style.display = 'none';
        var screen = document.getElementById('successScreen');
        screen.classList.add('show');

        document.getElementById('successOrderNum').textContent = result.orderNumber;
        document.getElementById('successReceipt').textContent  = result.receiptCode;

        var payLinksEl = document.getElementById('successPayLinks');
        var linksWithUrl = (result.items || []).filter(function(i) { return i.paymentLink; });
        if (linksWithUrl.length) {
          payLinksEl.innerHTML = '<p style="font-size:12px;font-weight:700;margin-bottom:4px;">Pay now:</p>'
            + linksWithUrl.map(function(i) {
                return '<a class="pay-link" href="' + esc(i.paymentLink) + '" target="_blank">'
                  + 'Pay for ' + esc(i.name) + ' (' + i.quantity + '×)</a>';
              }).join('');
        } else {
          payLinksEl.innerHTML = '<p style="font-size:12px;color:var(--muted);">Payment links have been sent to your email.</p>';
        }

        if (!cartOpen) { toggleCart(); }
      }

      // ── Reset ──────────────────────────────────────────────────────────────
      function resetCart() {
        cart = [];
        renderCart();
        document.getElementById('cartMain').style.display = '';
        document.getElementById('successScreen').classList.remove('show');
        document.getElementById('custName').value = '';
        document.getElementById('custEmail').value = '';
        document.getElementById('formError').textContent = '';
        document.getElementById('placeOrderBtn').disabled = false;
        document.getElementById('placeOrderBtn').textContent = 'Place Order';
        toggleCart();
      }

      // ── Utilities ──────────────────────────────────────────────────────────
      function esc(str) {
        return String(str || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 2500);
      }
    </script>
  </body>
</html>
