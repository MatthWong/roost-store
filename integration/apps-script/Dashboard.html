<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roost Store — Ops Dashboard</title>
    <style>
      :root {
        --bg:        #1a1a2e;
        --surface:   #16213e;
        --card:      #0f3460;
        --accent:    #5b2d90;
        --accent-h:  #7a3fbf;
        --text:      #e0e0e0;
        --muted:     #9a9ab0;
        --border:    #2a2a4a;
        --warn:      #e08020;
        --ok:        #2ecc71;
        --badge-r:   #c0392b;
        --badge-y:   #d4ac0d;
        --badge-b:   #2980b9;
        --badge-g:   #27ae60;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
        font-size: 14px;
        min-height: 100vh;
      }

      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 8px;
      }

      header h1 { font-size: 18px; color: #fff; }

      .meta {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .role-badge {
        background: var(--accent);
        color: #fff;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }

      #refresh-status { font-size: 11px; color: var(--muted); }

      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
        padding: 20px;
      }

      .queue {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
      }

      .queue-header {
        padding: 10px 14px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
      }

      .queue-header h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }

      .count-badge {
        min-width: 22px;
        height: 22px;
        border-radius: 11px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        padding: 0 6px;
        background: var(--border);
        color: var(--text);
      }

      .count-badge.has-items { background: var(--accent); color: #fff; }

      .queue-body { padding: 8px; }

      .empty-msg {
        text-align: center;
        color: var(--muted);
        padding: 20px 8px;
        font-size: 12px;
      }

      .order-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 8px;
        overflow: hidden;
      }

      .order-card:last-child { margin-bottom: 0; }

      .order-summary {
        padding: 10px 12px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 4px;
        user-select: none;
      }

      .order-summary:hover { background: rgba(255,255,255,.04); }

      .order-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .order-number { font-weight: 700; font-size: 13px; color: #fff; }

      .status-pill {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 7px;
        border-radius: 10px;
        white-space: nowrap;
        text-transform: uppercase;
        color: #fff;
      }

      .pill-submitted    { background: var(--badge-r); }
      .pill-quote        { background: var(--badge-y); color: #1a1a2e; }
      .pill-production   { background: var(--badge-b); }
      .pill-pickup       { background: var(--badge-g); }

      .unpaid-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: var(--badge-r);
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 10px;
        text-transform: uppercase;
      }

      .paid-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: var(--badge-g);
        color: #fff;
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 10px;
        text-transform: uppercase;
      }

      .mark-paid-btn {
        background: var(--ok);
        color: #1a1a2e;
        border: 0;
        border-radius: 6px;
        padding: 5px 12px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }
      .mark-paid-btn:hover { opacity: .85; }
      .mark-paid-btn:disabled { opacity: .5; cursor: default; }

      .cancel-btn {
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 11px;
        cursor: pointer;
        white-space: nowrap;
      }
      .cancel-btn:hover { border-color: #e74c3c; color: #e74c3c; }
      .cancel-btn:disabled { opacity: .4; cursor: default; }

      .cancel-form {
        margin-top: 8px;
        display: none;
        flex-direction: column;
        gap: 6px;
      }
      .cancel-form.open { display: flex; }

      .cancel-form textarea {
        background: var(--surface);
        color: var(--text);
        border: 1px solid #e74c3c;
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 12px;
        resize: vertical;
        min-height: 60px;
        font-family: inherit;
      }

      .cancel-form textarea::placeholder { color: var(--muted); }

      .confirm-cancel-btn {
        background: #e74c3c;
        color: #fff;
        border: 0;
        border-radius: 6px;
        padding: 5px 12px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        align-self: flex-start;
      }
      .confirm-cancel-btn:hover { background: #c0392b; }
      .confirm-cancel-btn:disabled { opacity: .5; cursor: default; }

      .order-meta {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .order-meta span b { color: var(--text); }

      .expand-icon {
        float: right;
        font-size: 10px;
        color: var(--muted);
        margin-top: -14px;
      }

      .order-detail {
        display: none;
        padding: 0 12px 12px;
        border-top: 1px solid var(--border);
        background: rgba(0,0,0,.15);
      }

      .order-detail.open { display: block; }

      .detail-row {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .detail-row b { color: var(--text); }

      .dup-warning {
        display: inline-block;
        margin-top: 6px;
        background: var(--warn);
        color: #1a1a2e;
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 6px;
      }

      .action-row {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      .action-row select {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px 8px;
        font-size: 12px;
        flex: 1;
      }

      .action-row button {
        background: var(--accent);
        color: #fff;
        border: 0;
        border-radius: 6px;
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }

      .action-row button:hover { background: var(--accent-h); }

      .action-msg {
        font-size: 11px;
        margin-top: 4px;
        color: var(--ok);
      }

      .action-msg.err { color: #e74c3c; }

      #toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--accent);
        color: #fff;
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 13px;
        opacity: 0;
        transition: opacity .3s;
        pointer-events: none;
        z-index: 100;
      }

      #toast.show { opacity: 1; }
    </style>
  </head>
  <body>
    <header>
      <h1>&#128203; Roost Store — Ops Dashboard</h1>
      <div class="meta">
        <span class="role-badge" id="roleDisplay">MEMBER</span>
        <span id="refresh-status">Last refreshed: —</span>
      </div>
    </header>

    <main id="dashboard">
      <div class="queue" id="q-needsReview">
        <div class="queue-header" style="border-left: 3px solid var(--badge-r);">
          <h2>&#128308; Needs Review</h2>
          <span class="count-badge" id="cnt-needsReview">0</span>
        </div>
        <div class="queue-body" id="list-needsReview"></div>
      </div>

      <div class="queue" id="q-underReview">
        <div class="queue-header" style="border-left: 3px solid var(--warn);">
          <h2>&#128269; Under Review</h2>
          <span class="count-badge" id="cnt-underReview">0</span>
        </div>
        <div class="queue-body" id="list-underReview"></div>
      </div>

      <div class="queue" id="q-awaitingResponse">
        <div class="queue-header" style="border-left: 3px solid var(--badge-y);">
          <h2>&#128993; Awaiting Response</h2>
          <span class="count-badge" id="cnt-awaitingResponse">0</span>
        </div>
        <div class="queue-body" id="list-awaitingResponse"></div>
      </div>

      <div class="queue" id="q-pendingProduction">
        <div class="queue-header" style="border-left: 3px solid var(--badge-o, #f97316);">
          <h2>&#128336; Pending Production</h2>
          <span class="count-badge" id="cnt-pendingProduction">0</span>
        </div>
        <div class="queue-body" id="list-pendingProduction"></div>
      </div>

      <div class="queue" id="q-inProduction">
        <div class="queue-header" style="border-left: 3px solid var(--badge-b);">
          <h2>&#9881;&#65039; In Production</h2>
          <span class="count-badge" id="cnt-inProduction">0</span>
        </div>
        <div class="queue-body" id="list-inProduction"></div>
      </div>

      <div class="queue" id="q-readyForPickup">
        <div class="queue-header" style="border-left: 3px solid var(--badge-g);">
          <h2>&#9989; Ready for Pickup</h2>
          <span class="count-badge" id="cnt-readyForPickup">0</span>
        </div>
        <div class="queue-body" id="list-readyForPickup"></div>
      </div>
    </main>

    <div id="toast"></div>

    <script id="initialData" type="application/json"><?!= initialDataJson ?></script>
    <script>
      var WEB_APP_URL = '<?!= webAppUrl ?>';
      var USER_ROLE   = '<?!= userRole ?>';

      var NEXT_STATUSES = {
        'Submitted':          ['Under Review', 'In Production'],
        'Under Review':       ['Quote Provided', 'In Production'],
        'Quote Provided':     ['Quote Accepted'],
        'Quote Accepted':     ['Pending Production'],
        'Pending Production': ['In Production'],
        'In Production':      ['Ready for Pickup'],
        'Ready for Pickup':   ['Picked Up']
      };

      var PILL_CLASS = {
        'Submitted':        'pill-submitted',
        'Quote Provided':   'pill-quote',
        'In Production':    'pill-production',
        'Ready for Pickup': 'pill-pickup'
      };

      document.getElementById('roleDisplay').textContent = USER_ROLE;

      function formatDate(val) {
        if (!val) { return '—'; }
        try {
          var d = new Date(val);
          if (isNaN(d.getTime())) { return String(val); }
          return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        } catch (e) { return String(val); }
      }

      function toggleCancelForm(btn) {
        var orderNumber = btn.getAttribute('data-order');
        var form = document.getElementById('cancel-form-' + orderNumber);
        if (!form) { return; }
        var open = form.classList.toggle('open');
        btn.textContent = open ? 'Never mind' : 'Cancel Order';
        btn.style.color  = open ? 'var(--muted)' : '';
        btn.style.borderColor = open ? 'var(--border)' : '';
      }

      function esc(str) {
        return String(str || '')
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }

      function buildActionRow(order) {
        if (USER_ROLE !== 'OFFICER' && USER_ROLE !== 'SPONSOR') { return ''; }
        var nexts = (NEXT_STATUSES[order.status] || []).filter(function(s) {
          // Cannot move to Picked Up until the order is paid
          if (s === 'Picked Up' && !order.isPaid) { return false; }
          return true;
        });
        if (!nexts.length) { return ''; }
        var opts = nexts.map(function(s) {
          return '<option value="' + esc(s) + '">' + esc(s) + '</option>';
        }).join('');
        return '<div class="action-row">' +
          '<select class="status-select">' + opts + '</select>' +
          '<button class="update-btn" data-order="' + esc(order.orderNumber) + '">Update</button>' +
          '</div>' +
          '<div class="action-msg" id="msg-' + esc(order.orderNumber) + '"></div>';
      }

      function buildCard(order) {
        var pill = PILL_CLASS[order.status] || '';
        var isTerminal = order.status === 'Picked Up' || order.status === 'Cancelled';
        var payBadge = !isTerminal
          ? (order.isPaid
            ? '<span class="paid-badge">&#10003; Paid</span>'
            : '<span class="unpaid-badge">&#9888; Unpaid</span>')
          : '';
        var detail = '';
        if (order.itemSummary)      { detail += '<div class="detail-row"><b>Item:</b> ' + esc(order.itemSummary) + '</div>'; }
        if (order.pickupWindow)     { detail += '<div class="detail-row"><b>Pickup Window:</b> ' + esc(order.pickupWindow) + '</div>'; }
        if (order.duplicateWarning) { detail += '<span class="dup-warning">&#9888; Possible Duplicate</span>'; }
        if (!isTerminal && !order.isPaid && (USER_ROLE === 'OFFICER' || USER_ROLE === 'SPONSOR')) {
          detail += '<div class="action-row" style="margin-top:10px;">'
            + '<button class="mark-paid-btn" data-order="' + esc(order.orderNumber) + '">Mark as Paid</button>'
            + '</div>'
            + '<div class="action-msg" id="paid-msg-' + esc(order.orderNumber) + '"></div>';
        }
        detail += buildActionRow(order);
        if (USER_ROLE === 'OFFICER' || USER_ROLE === 'SPONSOR') {
          detail += '<div class="action-row" style="margin-top:6px;">'
            + '<button class="cancel-btn" data-order="' + esc(order.orderNumber) + '" onclick="toggleCancelForm(this)">Cancel Order</button>'
            + '</div>'
            + '<div class="cancel-form" id="cancel-form-' + esc(order.orderNumber) + '">'
            +   '<textarea placeholder="Reason for cancellation (required)…" id="cancel-reason-' + esc(order.orderNumber) + '"></textarea>'
            +   '<button class="confirm-cancel-btn" data-order="' + esc(order.orderNumber) + '">Confirm Cancellation</button>'
            + '</div>'
            + '<div class="action-msg err" id="cancel-msg-' + esc(order.orderNumber) + '"></div>';
        }

        return '<div class="order-card">' +
          '<div class="order-summary">' +
            '<div class="order-top">' +
              '<span class="order-number">' + esc(order.orderNumber) + '</span>' +
              '<div style="display:flex;gap:5px;align-items:center;">' +
                payBadge +
                '<span class="status-pill ' + pill + '">' + esc(order.status) + '</span>' +
              '</div>' +
            '</div>' +
            '<div class="order-meta">' +
              '<span><b>Type:</b> ' + esc(order.orderType || 'N/A') + '</span>' +
              '<span><b>Customer:</b> ' + esc(order.customerName || 'N/A') + '</span>' +
              '<span><b>Updated:</b> ' + esc(formatDate(order.updatedAt)) + '</span>' +
            '</div>' +
            '<span class="expand-icon">&#9660;</span>' +
          '</div>' +
          '<div class="order-detail">' + detail + '</div>' +
        '</div>';
      }

      function renderQueue(listId, cntId, orders) {
        var list = document.getElementById(listId);
        var cnt  = document.getElementById(cntId);
        if (!list || !cnt) { return; }
        cnt.textContent = orders.length;
        cnt.className = 'count-badge' + (orders.length ? ' has-items' : '');
        if (!orders.length) {
          list.innerHTML = '<div class="empty-msg">No orders</div>';
          return;
        }
        list.innerHTML = orders.map(buildCard).join('');
        list.querySelectorAll('.order-summary').forEach(function(el) {
          el.addEventListener('click', function() {
            var detail = el.nextElementSibling;
            var icon = el.querySelector('.expand-icon');
            detail.classList.toggle('open');
            icon.innerHTML = detail.classList.contains('open') ? '&#9650;' : '&#9660;';
          });
        });
        list.querySelectorAll('.confirm-cancel-btn').forEach(function(btn) {
          btn.addEventListener('click', function(ev) {
            ev.stopPropagation();
            var orderNumber = btn.getAttribute('data-order');
            var reasonEl = document.getElementById('cancel-reason-' + orderNumber);
            var msgEl    = document.getElementById('cancel-msg-'  + orderNumber);
            var reason   = reasonEl ? reasonEl.value.trim() : '';
            if (!reason) {
              if (msgEl) { msgEl.textContent = 'Please enter a cancellation reason.'; }
              return;
            }
            btn.disabled = true;
            btn.textContent = 'Cancelling…';
            google.script.run
              .withSuccessHandler(function(result) {
                showToast(orderNumber + ' cancelled');
                if (result) {
                  USER_ROLE = result.userRole || USER_ROLE;
                  renderAll(result.orders || {});
                } else {
                  btn.disabled = false;
                  btn.textContent = 'Confirm Cancellation';
                }
              })
              .withFailureHandler(function(err) {
                var msg = (err && err.message) ? err.message : 'Cancellation failed.';
                showToast('Error: ' + msg);
                if (msgEl) { msgEl.textContent = msg; }
                btn.disabled = false;
                btn.textContent = 'Confirm Cancellation';
              })
              .cancelOrderAndGetDashboard(orderNumber, reason);
          });
        });
        list.querySelectorAll('.mark-paid-btn').forEach(function(btn) {
          btn.addEventListener('click', function(ev) {
            ev.stopPropagation();
            var orderNumber = btn.getAttribute('data-order');
            var msgEl = document.getElementById('paid-msg-' + orderNumber);
            btn.disabled = true;
            btn.textContent = 'Saving…';
            google.script.run
              .withSuccessHandler(function(result) {
                showToast(orderNumber + ' marked as paid');
                if (result) {
                  USER_ROLE = result.userRole || USER_ROLE;
                  renderAll(result.orders || {});
                } else {
                  btn.disabled = false;
                  btn.textContent = 'Mark as Paid';
                }
              })
              .withFailureHandler(function(err) {
                var msg = (err && err.message) ? err.message : 'Update failed.';
                showToast('Error: ' + msg);
                if (msgEl) { msgEl.textContent = msg; msgEl.className = 'action-msg err'; }
                btn.disabled = false;
                btn.textContent = 'Mark as Paid';
              })
              .markOrderPaidAndGetDashboard(orderNumber);
          });
        });
        list.querySelectorAll('.update-btn').forEach(function(btn) {
          btn.addEventListener('click', function(ev) {
            ev.stopPropagation();
            var orderNumber = btn.getAttribute('data-order');
            var select = btn.parentElement.querySelector('.status-select');
            var newStatus = select ? select.value : '';
            var msgEl = document.getElementById('msg-' + orderNumber);
            if (!newStatus) { return; }
            btn.disabled = true;
            btn.textContent = 'Saving…';
            google.script.run
              .withSuccessHandler(function(result) {
                showToast('Updated ' + orderNumber + ' → ' + newStatus);
                if (result) {
                  USER_ROLE = result.userRole || USER_ROLE;
                  renderAll(result.orders || {});
                } else {
                  btn.disabled = false;
                  btn.textContent = 'Update';
                }
              })
              .withFailureHandler(function(err) {
                var msg = (err && err.message) ? err.message : 'Update failed.';
                showToast('Error: ' + msg);
                if (msgEl) { msgEl.textContent = msg; msgEl.className = 'action-msg err'; }
                btn.disabled = false;
                btn.textContent = 'Update';
              })
              .updateStatusAndGetDashboard(orderNumber, newStatus);
          });
        });
      }

      function renderAll(data) {
        renderQueue('list-needsReview',       'cnt-needsReview',       data.needsReview       || []);
        renderQueue('list-underReview',       'cnt-underReview',       data.underReview       || []);
        renderQueue('list-awaitingResponse',  'cnt-awaitingResponse',  data.awaitingResponse  || []);
        renderQueue('list-pendingProduction', 'cnt-pendingProduction', data.pendingProduction  || []);
        renderQueue('list-inProduction',      'cnt-inProduction',      data.inProduction       || []);
        renderQueue('list-readyForPickup',    'cnt-readyForPickup',    data.readyForPickup     || []);
        document.getElementById('refresh-status').textContent =
          'Last refreshed: ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      }

      function refreshData() {
        google.script.run
          .withSuccessHandler(function(result) {
            if (result) {
              USER_ROLE = result.userRole || USER_ROLE;
              renderAll(result.orders || {});
            }
          })
          .withFailureHandler(function() {
            document.getElementById('refresh-status').textContent = 'Refresh failed — retrying…';
          })
          .getDashboardDataForUI();
      }

      function showToast(msg) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(function() { t.classList.remove('show'); }, 3000);
      }

      // Initial render from server-injected data
      var initialText = document.getElementById('initialData').textContent || '';
      try {
        var initialData = JSON.parse(initialText);
        renderAll(initialData);
      } catch (e) {
        renderAll({});
      }

      // Auto-refresh every 60 seconds
      setInterval(refreshData, 60000);
    </script>
  </body>
</html>
